[package]
name = "emnr-cli"
edition.workspace = true
license.workspace = true
version.workspace = true

[[bin]]
name = "emnr-cli"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
emnr-core = { path = "../emnr-core" }
emnr-matter-bridge = { path = "../emnr-matter-bridge" }
emnr-runtime = { path = "../emnr-runtime" }
emnr-tensor = { path = "../emnr-tensor" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
