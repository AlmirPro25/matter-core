<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatterZap Web</title>
    <style>
        :root {
            --bg-color: #efeae2;
            --header-bg: #f0f2f5;
            --chat-bg: #efeae2;
            --message-in: #ffffff;
            --message-out: #d9fdd3;
            --text-main: #111b21;
            --text-meta: #667781;
            --green-primary: #00a884;
            --sidebar-bg: #ffffff;
            --border-color: #e9edef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #d1d7db;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fake background green strip */
        .bg-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 127px;
            background-color: var(--green-primary);
            z-index: 0;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            height: calc(100vh - 40px);
            background: var(--bg-color);
            position: relative;
            z-index: 1;
            display: flex;
            box-shadow: 0 6px 18px rgba(11,20,26,.05);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 30%;
            min-width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-bar {
            padding: 8px 12px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #f0f2f5;
            outline: none;
            font-size: 15px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f2f2f2;
            transition: background 0.2s;
        }

        .chat-item:hover, .chat-item.active {
            background: #f5f6f6;
        }

        .chat-info {
            flex: 1;
            margin-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-name {
            font-size: 17px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-meta);
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-meta);
            margin-top: 2px;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-repeat: repeat;
            position: relative;
        }

        .chat-header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            z-index: 2;
        }

        .chat-header-info {
            margin-left: 15px;
        }

        .chat-header-name {
            font-size: 16px;
            color: var(--text-main);
            font-weight: 500;
        }

        .chat-header-status {
            font-size: 13px;
            color: var(--text-meta);
            margin-top: 2px;
        }

        .messages {
            flex: 1;
            padding: 20px 5%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14.2px;
            color: var(--text-main);
            position: relative;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .message-in {
            align-self: flex-start;
            background: var(--message-in);
            border-top-left-radius: 0;
        }

        .message-out {
            align-self: flex-end;
            background: var(--message-out);
            border-top-right-radius: 0;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-meta);
            float: right;
            margin: 10px 0 -5px 10px;
        }

        .input-area {
            height: 62px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 10px;
            z-index: 2;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #ffffff;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn svg {
            fill: #54656f;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                display: flex;
            }
            .chat-area {
                display: none;
            }
            .app-container {
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="bg-strip"></div>
    
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="header">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=Almir&background=00a884&color=fff" alt="User">
                </div>
                <div style="color: #54656f; display: flex; gap: 20px;">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12.072 1.761a10.05 10.05 0 0 0-9.303 5.65.977.977 0 0 0 1.756.855 8.098 8.098 0 0 1 7.496-4.553.977.977 0 1 0 .051-1.952zM1.926 13.64a10.052 10.052 0 0 0 7.461 7.925.977.977 0 0 0 .471-1.895 8.097 8.097 0 0 1-6.012-6.386.977.977 0 0 0-1.92.356zm13.729 7.454a10.053 10.053 0 0 0 6.201-8.946.976.976 0 1 0-1.951-.081v.014a8.097 8.097 0 0 1-4.997 7.209.977.977 0 0 0 .747 1.804z"></path></svg>
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 7a2 2 0 1 0-.001-4.001A2 2 0 0 0 12 7zm0 2a2 2 0 1 0-.001 3.999A2 2 0 0 0 12 9zm0 6a2 2 0 1 0-.001 3.999A2 2 0 0 0 12 15z"></path></svg>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Pesquisar ou começar uma nova conversa">
            </div>

            <div class="chat-list">
                <div class="chat-item active">
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Matter+Bot&background=2563eb&color=fff" alt="Bot">
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">
                            <span>Matter Bot</span>
                            <span class="chat-time">Agora</span>
                        </div>
                        <div class="chat-preview" id="preview-text">Oi! Eu sou o assistente do Matter.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=Matter+Bot&background=2563eb&color=fff" alt="Bot">
                </div>
                <div class="chat-header-info">
                    <div class="chat-header-name">Matter Bot</div>
                    <div class="chat-header-status">online</div>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="message message-in">
                    <div>Olá! Bem-vindo ao MatterZap! 🚀</div>
                    <div class="msg-time">10:00</div>
                </div>
                <div class="message message-in">
                    <div>Eu sou um sistema rodando sob o Matter Core v25, respondendo do seu novo Servidor Async!</div>
                    <div class="msg-time">10:00</div>
                </div>
            </div>

            <div class="input-area">
                <svg viewBox="0 0 24 24" width="26" height="26" style="fill: #54656f; cursor:pointer;"><path d="M11.999 14.942c2.001 0 3.531-1.53 3.531-3.531V4.35c0-2.001-1.53-3.531-3.531-3.531S8.468 2.349 8.468 4.35v7.061c0 2.001 1.53 3.531 3.531 3.531z"></path></svg>
                <input type="text" class="message-input" id="message-input" placeholder="Digite uma mensagem" autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M1.101 21.757 23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const messages = document.getElementById('messages');
        const preview = document.getElementById('preview-text');

        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function addMessage(text, isOut) {
            const div = document.createElement('div');
            div.className = `message ${isOut ? 'message-out' : 'message-in'}`;
            div.innerHTML = `<div>${text}</div><div class="msg-time">${getTime()}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            preview.innerText = text;
        }

        function handleSend() {
            const text = input.value.trim();
            if (text) {
                addMessage(text, true);
                input.value = '';
                
                // Simulate Bot Response
                setTimeout(() => {
                    let response = "Interessante! O Matter Core está rodando rápido.";
                    if(text.toLowerCase().includes("ping")) response = "Pong! 🏓";
                    if(text.toLowerCase().includes("matter")) response = "Matter é a melhor linguagem do mundo! 🚀";
                    addMessage(response, false);
                }, 1000);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
