[package]
name = "matter-profiler"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
matter-ast = { workspace = true }
matter-error = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
