[package]
name = "matter-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
matter-ast = { path = "../matter-ast" }
matter-lexer = { path = "../matter-lexer" }
matter-parser = { path = "../matter-parser" }
matter-bytecode = { path = "../matter-bytecode" }
matter-vm = { path = "../matter-vm" }
matter-runtime = { path = "../matter-runtime" }
matter-error = { path = "../matter-error" }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"

[dev-dependencies]
wasm-bindgen-test = "0.3"

