name: Feature request
description: Propose a Matter Core improvement.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or workflow should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, API, CLI command, language feature, or documentation change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Parser
        - Bytecode
        - VM/runtime
        - Package/project flow
        - Visual/web runtime
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Add sample Matter code, commands, or output if useful.
