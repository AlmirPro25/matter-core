name: Bug report
description: Report a reproducible Matter Core problem.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Matter Core bug. Please include enough detail to reproduce it locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The CLI/runtime/parser fails when...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, input files, or code needed to reproduce the issue.
      render: powershell
      placeholder: |
        cargo run -q -p matter-cli -- check examples/hello.matter
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11, Ubuntu 24.04, macOS 15
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: rustc --version
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
