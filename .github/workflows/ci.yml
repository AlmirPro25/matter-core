name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rust workspace
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ runner.temp }}\matter_target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check CLI
        run: cargo check -p matter-cli

      - name: Test workspace
        run: cargo test --workspace --all-targets
